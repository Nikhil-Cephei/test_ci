name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  VITE_APP_NAME: ${{ vars.VITE_APP_NAME }}
  VITE_APP_VERSION: ${{ vars.VITE_APP_VERSION }}
  VITE_APP_DESCRIPTION: ${{ vars.VITE_APP_DESCRIPTION }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 22 nikhilmakwana.in >> ~/.ssh/known_hosts

      - name: Install rsync on VPS
        run: ssh -i ~/.ssh/deploy_key -p 22 ubuntu@nikhilmakwana.in "command -v rsync || sudo apt-get install -y rsync"

      - name: Copy dist to VPS
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p 22" \
            dist/ \
            ubuntu@nikhilmakwana.in:/var/www/test-ci/

      - name: Start app with PM2
        run: |
          ssh -i ~/.ssh/deploy_key -p 22 ubuntu@nikhilmakwana.in << 'EOF'
            command -v serve  >/dev/null || sudo npm install -g serve
            command -v pm2    >/dev/null || sudo npm install -g pm2
            pm2 list | grep -q "test-ci" && pm2 restart test-ci \
              || pm2 start "serve -s /var/www/test-ci -l 3004" --name test-ci
            pm2 save
          EOF

      - name: Verify deployment
        run: |
          sleep 3
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://nikhilmakwana.in:3004)
          [ "$STATUS" = "200" ] && echo "Live at http://nikhilmakwana.in:3004" || { echo "HTTP $STATUS"; exit 1; }
